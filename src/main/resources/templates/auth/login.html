<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Bobo et ses copains</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Connexion Admin</h1>
                <p class="text-gray-600">Bobo et ses copains</p>
            </div>

            <div class="bg-white shadow-lg rounded-lg p-8">
                <!-- Success message -->
                <div th:if="${message}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
                    <p th:text="${message}"></p>
                </div>

                <!-- Error message -->
                <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
                    <p th:text="${error}"></p>
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-6">
                        <label for="username" class="block text-gray-700 font-semibold mb-2">
                            Nom d'utilisateur
                        </label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            required
                            autofocus
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Entrez votre nom d'utilisateur">
                    </div>

                    <div class="mb-6">
                        <label for="password" class="block text-gray-700 font-semibold mb-2">
                            Mot de passe
                        </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="Entrez votre mot de passe">
                    </div>

                    <button
                        type="submit"
                        class="w-full btn-primary text-center">
                        Se connecter
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a th:href="@{/}" class="text-blue-600 hover:text-blue-800">
                        Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
