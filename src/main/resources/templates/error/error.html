<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur - Bobo et ses copains</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <div class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="max-w-md w-full text-center">
            <h1 class="text-6xl font-bold text-red-600 mb-4" th:text="${status ?: '500'}">500</h1>
            <h2 class="text-3xl font-bold text-gray-900 mb-4" th:text="${error ?: 'Erreur'}">Erreur</h2>
            <p class="text-lg text-gray-600 mb-8" th:text="${message ?: 'Une erreur inattendue s\'est produite'}">
                Une erreur inattendue s'est produite
            </p>
            <a th:href="@{/}" class="btn-primary inline-block">
                Retour à l'accueil
            </a>
        </div>
    </div>
</body>
</html>
