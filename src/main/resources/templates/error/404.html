<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth-base}">
<head>
    <title>Page non trouvée</title>
</head>
<body>

    <div layout:fragment="content" class="max-w-md w-full text-center">
        <h1 class="text-9xl font-bold text-blue-600 mb-4">404</h1>
        <h2 class="text-3xl font-bold text-gray-900 mb-4">Page non trouvée</h2>
        <p class="text-lg text-gray-600 mb-8">
            Désolé, la page que vous recherchez n'existe pas ou a été déplacée.
        </p>
        <a th:href="@{/}" class="btn-primary inline-block">
            Retour à l'accueil
        </a>
    </div>

</body>
</html>
