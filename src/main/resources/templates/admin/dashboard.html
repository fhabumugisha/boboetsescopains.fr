<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Bobo et ses copains</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-gray-50">
    <!-- Admin Navbar -->
    <nav class="bg-gray-900 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Admin - Bobo et ses copains</h1>
            <div class="flex items-center space-x-4">
                <span sec:authentication="name" class="text-gray-300"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="btn-primary bg-red-600 hover:bg-red-700">
                        Déconnexion
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Statistics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-gray-600 text-sm font-semibold mb-2">Total Livres</h3>
                <p class="text-4xl font-bold text-blue-600" th:text="${totalBooks}">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-gray-600 text-sm font-semibold mb-2">Publiés</h3>
                <p class="text-4xl font-bold text-green-600" th:text="${publishedCount}">0</p>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h3 class="text-gray-600 text-sm font-semibold mb-2">Brouillons</h3>
                <p class="text-4xl font-bold text-orange-600" th:text="${draftCount}">0</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">Actions rapides</h2>
            <div class="flex flex-wrap gap-4">
                <a th:href="@{/admin/books}" class="btn-primary">
                    Gérer les livres
                </a>
                <a th:href="@{/admin/books/new}" class="btn-primary bg-green-600 hover:bg-green-700">
                    Ajouter un livre
                </a>
                <a th:href="@{/}" class="btn-primary bg-gray-600 hover:bg-gray-700" target="_blank">
                    Voir le site
                </a>
            </div>
        </div>

        <!-- Recent Books -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-2xl font-bold mb-4">Livres récents</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Titre
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Statut
                            </th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Vues
                            </th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="book : ${recentBooks}">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <a th:href="@{/admin/books/{id}/edit(id=${book.id})}"
                                   th:text="${book.title}"
                                   class="text-blue-600 hover:text-blue-800 font-medium">
                                </a>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span th:classappend="${book.status.name() == 'PUBLISHED'} ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800'"
                                      class="px-2 py-1 text-xs font-semibold rounded-full"
                                      th:text="${book.status}">
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                <span th:text="${book.viewsCount}">0</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
