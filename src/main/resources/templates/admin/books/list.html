<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des livres - Admin</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-gray-900 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold">Gestion des Livres</h1>
            <div class="space-x-4">
                <a th:href="@{/admin/dashboard}" class="text-white hover:text-blue-400">Dashboard</a>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="btn-primary bg-red-600 hover:bg-red-700">Déconnexion</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-bold">Tous les livres</h2>
            <a th:href="@{/admin/books/new}" class="btn-primary bg-green-600 hover:bg-green-700">
                + Ajouter un livre
            </a>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${successMessage}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
            <p th:text="${successMessage}"></p>
        </div>
        <div th:if="${errorMessage}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
            <p th:text="${errorMessage}"></p>
        </div>

        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Couverture</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Titre</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Statut</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Vues</th>
                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr th:each="book : ${books}">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <img th:src="${book.coverImageUrl}" th:alt="${book.title}"
                                 class="h-16 w-12 object-cover rounded">
                        </td>
                        <td class="px-6 py-4">
                            <div class="text-sm font-medium text-gray-900" th:text="${book.title}"></div>
                            <div class="text-sm text-gray-500" th:text="${book.slug}"></div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span th:classappend="${book.status.name() == 'PUBLISHED'} ? 'bg-green-100 text-green-800' : 'bg-orange-100 text-orange-800'"
                                  class="px-2 py-1 text-xs font-semibold rounded-full"
                                  th:text="${book.status}">
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span th:text="${book.viewsCount}">0</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                            <a th:href="@{/admin/books/{id}/edit(id=${book.id})}"
                               class="text-blue-600 hover:text-blue-900">Modifier</a>
                            <button
                                th:hx-delete="@{/admin/books/{id}(id=${book.id})}"
                                hx-confirm="Êtes-vous sûr de vouloir supprimer ce livre ?"
                                class="text-red-600 hover:text-red-900">
                                Supprimer
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
