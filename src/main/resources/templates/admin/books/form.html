<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Modifier le livre' : 'Ajouter un livre'}">Formulaire Livre</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-gray-50">
    <nav class="bg-gray-900 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold" th:text="${isEdit ? 'Modifier le livre' : 'Ajouter un livre'}"></h1>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <div class="bg-white rounded-lg shadow-lg p-8">
            <form th:action="${isEdit ? '/admin/books/' + book.id : '/admin/books'}"
                  th:object="${book}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="mb-6">
                    <label for="title" class="block text-gray-700 font-semibold mb-2">Titre *</label>
                    <input type="text" id="title" th:field="*{title}" required
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-6">
                    <label for="slug" class="block text-gray-700 font-semibold mb-2">Slug (URL)</label>
                    <input type="text" id="slug" th:field="*{slug}"
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <p class="text-sm text-gray-500 mt-1">Laissez vide pour générer automatiquement</p>
                </div>

                <div class="mb-6">
                    <label for="shortDescription" class="block text-gray-700 font-semibold mb-2">Description courte</label>
                    <textarea id="shortDescription" th:field="*{shortDescription}" rows="3"
                              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="mb-6">
                    <label for="fullDescription" class="block text-gray-700 font-semibold mb-2">Description complète</label>
                    <textarea id="fullDescription" th:field="*{fullDescription}" rows="6"
                              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>

                <div class="mb-6">
                    <label for="coverImageFile" class="block text-gray-700 font-semibold mb-2">Image de couverture</label>
                    <input type="file" id="coverImageFile" name="coverImageFile" accept="image/*"
                           class="w-full px-4 py-2 border rounded-lg">
                    <div th:if="${book.coverImageUrl != null}" class="mt-2">
                        <img th:src="${book.coverImageUrl}" alt="Current cover" class="h-32 rounded">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label for="price" class="block text-gray-700 font-semibold mb-2">Prix (€)</label>
                        <input type="number" id="price" th:field="*{price}" step="0.01"
                               class="w-full px-4 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label for="status" class="block text-gray-700 font-semibold mb-2">Statut</label>
                        <select id="status" th:field="*{status}"
                                class="w-full px-4 py-2 border rounded-lg">
                            <option value="DRAFT">Brouillon</option>
                            <option value="PUBLISHED">Publié</option>
                            <option value="ARCHIVED">Archivé</option>
                        </select>
                    </div>
                </div>

                <div class="mb-6">
                    <label for="amazonLink" class="block text-gray-700 font-semibold mb-2">Lien Amazon</label>
                    <input type="url" id="amazonLink" th:field="*{amazonLink}"
                           class="w-full px-4 py-2 border rounded-lg">
                </div>

                <div class="mb-6">
                    <label for="ebookLink" class="block text-gray-700 font-semibold mb-2">Lien E-Book</label>
                    <input type="url" id="ebookLink" th:field="*{ebookLink}"
                           class="w-full px-4 py-2 border rounded-lg">
                </div>

                <div class="mb-6">
                    <label class="flex items-center">
                        <input type="checkbox" th:field="*{featured}" class="mr-2">
                        <span class="text-gray-700 font-semibold">Livre en vedette</span>
                    </label>
                </div>

                <div class="flex justify-between">
                    <a th:href="@{/admin/books}" class="btn-primary bg-gray-600 hover:bg-gray-700">
                        Annuler
                    </a>
                    <button type="submit" class="btn-primary">
                        <span th:text="${isEdit ? 'Mettre à jour' : 'Créer'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
