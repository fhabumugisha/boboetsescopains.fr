<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/images/apple-touch-icon.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/images/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/images/favicon-16x16.png}">

    <!-- Tailwind CSS -->
    <link rel="stylesheet" th:href="@{/css/output.css}">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <title th:text="${pageTitle ?: 'Bobo et ses copains'}">Bobo et ses copains</title>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0TDHX8MH78"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-0TDHX8MH78');
    </script>
</head>
<body class="flex flex-col min-h-screen bg-gray-50">

    <!-- Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-12">

        <!-- Books List - Dynamic from Database -->
        <div th:if="${books != null and !books.isEmpty()}">
            <div th:each="book : ${books}" class="card animate-fade-in mb-8">
                <div class="grid md:grid-cols-3 gap-6">
                    <div class="md:col-span-1">
                        <a th:href="@{/books/{slug}(slug=${book.slug})}">
                            <img th:src="${book.coverImageUrl != null ? book.coverImageUrl : '/images/placeholder-book.png'}"
                                 th:alt="${book.title}"
                                 class="w-full h-auto rounded-lg shadow-md hover:shadow-xl transition duration-300">
                        </a>
                    </div>
                    <div class="md:col-span-2">
                        <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
                            <a th:href="@{/books/{slug}(slug=${book.slug})}"
                               th:text="${book.title}"
                               class="hover:text-blue-600 transition">
                                Titre du livre
                            </a>
                        </h1>
                        <p class="text-lg text-gray-700 leading-relaxed mb-6"
                           th:utext="${book.fullDescription != null ? book.fullDescription : book.shortDescription}">
                            Description du livre
                        </p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <a th:if="${book.amazonLink != null and !book.amazonLink.isEmpty()}"
                               th:href="${book.amazonLink}"
                               class="btn-primary"
                               tabindex="-1"
                               role="button"
                               target="_blank"
                               rel="noopener noreferrer">
                                Je commande
                            </a>
                            <script src="https://crafty-speaker-8203.ck.page/commerce.js" async defer></script>
                            <a th:if="${book.ebookLink != null and !book.ebookLink.isEmpty()}"
                               class="btn-primary bg-green-600 hover:bg-green-700"
                               th:href="${book.ebookLink}"
                               data-commerce
                               target="_blank"
                               rel="noopener noreferrer">
                                J'achète l'E-Book
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${books == null or books.isEmpty()}"
             class="text-center py-12">
            <h2 class="text-2xl font-bold text-gray-700 mb-4">Aucun livre disponible pour le moment</h2>
            <p class="text-gray-600">Revenez bientôt pour découvrir nos nouveaux livres !</p>
        </div>

    </main>

    <!-- Footer -->
    <div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
